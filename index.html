<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Earn Pro</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#f1f5f9;
font-family: system-ui;
}

/* CARD */
.card{
background:white;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

/* BUTTON */
.btn{
background:#16a34a;
color:white;
border-radius:12px;
padding:12px;
font-weight:600;
transition:0.2s;
}
.btn:active{transform:scale(0.96)}

.nav-active{color:#16a34a}
</style>

</head>

<body>

<div class="p-4 space-y-5">

<!-- HEADER -->

<div class="card p-5">
<p class="text-gray-500 text-sm">Total Balance</p>
<h1 class="text-3xl font-bold">$<span id="balance">0.00</span></h1>
</div>

<!-- REWARD CARD -->

<div class="card p-5 flex justify-between items-center">
<div>
<p class="text-gray-500 text-sm">Available Reward</p>
<h2 class="text-xl font-bold">$5.75</h2>
<button class="btn mt-2">Redeem</button>
</div>
<div class="text-5xl">🏆</div>
</div>

<!-- TASKS -->

<div class="card p-5 space-y-4">

<h3 class="font-semibold text-gray-600">Available Tasks</h3>

<div class="flex justify-between items-center">
<div>
<p class="font-medium">Watch Video Ads</p>
<p class="text-sm text-gray-500">Earn $0.10</p>
</div>
<button class="btn" onclick="watch()">Start</button>
</div>

<div class="flex justify-between items-center">
<div>
<p class="font-medium">Open Links</p>
<p class="text-sm text-gray-500">Earn $0.08</p>
</div>
<button class="btn" onclick="earn()">Start</button>
</div>

<div class="flex justify-between items-center">
<div>
<p class="font-medium">Daily Bonus</p>
<p class="text-sm text-gray-500">Claim reward</p>
</div>
<button class="btn" onclick="daily()">Claim</button>
</div>

</div>

</div>

<!-- NAV -->

<div class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 text-gray-500">

<div class="nav-active text-center">
🏠<br><span class="text-xs">Home</span>
</div>

<div class="text-center">
🎁<br><span class="text-xs">Rewards</span>
</div>

<div class="text-center">
⚙️<br><span class="text-xs">Settings</span>
</div>

</div>

<script>
let bal=0;

function update(){
balance.innerText=bal.toFixed(2);
}

function watch(){
bal+=0.10;
update();
}

function earn(){
bal+=0.08;
update();
}

function daily(){
bal+=0.30;
update();
}

update();
</script>

</body>
</html>
