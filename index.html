<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Reward Pro - High Energy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        /* --- Theme & Core Styles --- */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0F172A; color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* SCROLL FIX: Hidden ko hata kar auto kiya hai */
            overflow-x: hidden;
            overflow-y: auto; 
        }

        /* --- Animated Header (Sticky) --- */
        header {
            background: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            padding: 25px 20px;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            position: sticky; top: 0; z-index: 1000;
        }

        .balance-container { display: flex; flex-direction: column; }
        .balance-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; color: #E0E7FF; }
        .balance-amount { font-size: 32px; font-weight: 800; color: #fff; }

        /* SAME TO SAME VIDEO ANIMATION */
        .header-cash-gif {
            width: 75px; height: 75px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        .content-area { 
            flex: 1; 
            padding: 20px; 
            /* SCROLL SPACE: Niche nav bar ke liye jagah */
            padding-bottom: 140px; 
        }

        /* --- Cards & Buttons --- */
        .section-tag { font-size: 14px; font-weight: 800; color: #6366F1; text-transform: uppercase; margin: 25px 0 12px 0; }
        .card { background: #1E293B; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        
        .checkin-card { border-left: 5px solid #10B981; }
        .video-card { border-top: 3px solid #3B82F6; }
        .clicker-card { border-bottom: 3px solid #EC4899; }

        .jackpot-card {
            background: linear-gradient(145deg, #1E293B, #0F172A);
            border: 2px solid #F59E0B; overflow: hidden;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }

        .btn {
            width: 100%; padding: 18px; border-radius: 14px; border: none; font-size: 16px;
            font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.2s;
        }
        .btn-green { background: #10B981; color: white; }
        .btn-blue { background: #3B82F6; color: white; }
        .btn-gold { background: linear-gradient(90deg, #F59E0B, #D97706); color: white; }
        .btn-pink { background: #EC4899; color: white; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* --- Footer Navigation --- */
        nav {
            position: fixed; bottom: 0; width: 100%; background: #0B1120;
            display: flex; justify-content: space-around; padding: 15px;
            border-top: 1px solid #1E293B; height: 100px; align-items: center; z-index: 1000;
        }
        .nav-item { color: #64748B; font-size: 12px; font-weight: 700; text-align: center; text-decoration: none; flex: 1; }
        .nav-item.active { color: #6366F1; }
        .nav-icon { font-size: 26px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="balance-container">
            <span class="balance-label">MY RICHES 💸</span>
            <div class="balance-amount">💰 <span id="user-balance">0</span></div>
        </div>
        <img src="https://www.icegif.com/wp-content/uploads/money-wings-icegif-1.gif" alt="Flying Money" class="header-cash-gif">
    </header>

    <div class="content-area">
        
        <div class="section-tag">⚡ ENERGY SURGE</div>
        <div class="card checkin-card">
            <h3 style="font-size: 18px;">Daily Power-Up 🎁</h3>
            <p id="checkin-msg" style="font-size: 12px; color: #94A3B8; margin-bottom: 15px;">Claim 500 coins every 24 hours.</p>
            <button id="daily-btn" class="btn btn-green" onclick="collectDaily()">CLAIM 500 ENERGY 🔋</button>
        </div>

        <div class="section-tag">📺 VIDEO MANIA</div>
        <div class="card video-card">
            <h3 style="font-size: 18px;">Instant Crypto-Vids 📽️</h3>
            <p style="font-size: 12px; color: #94A3B8; margin-bottom: 10px;">Watch and Earn!</p>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 800; color: #3B82F6;"><span id="ads-count">0</span>/30 DONE 🔥</span>
                <button class="btn btn-blue" style="width: auto; padding: 10px 25px;" onclick="showAdsgram()">PLAY ▶️</button>
            </div>
        </div>

        <div class="section-tag">🔥 THE MONEY JACKPOT</div>
        <div class="card jackpot-card">
            <h2 style="color: #F59E0B; text-align: center;">PREMIUM OFFERWALL 💎</h2>
            <button class="btn btn-gold" style="margin-top: 15px;" onclick="openOfferwall()">UNLOCK RICHES 🚀</button>
        </div>

        <div class="section-tag">🚀 PRO CLICKER MISSIONS</div>
        <div class="card clicker-card">
            <h3 style="font-size: 18px;">Smart Interaction 🎯</h3>
            <p style="font-size: 12px; color: #94A3B8; margin-bottom: 15px;">Stay 30s & win big!</p>
            <button class="btn btn-pink" onclick="openMonetag()">START MISSION 🖱️</button>
        </div>

    </div>

    <nav>
        <a href="#" class="nav-item active"><span class="nav-icon">🏠</span>EARN</a>
        <a href="#" class="nav-item"><span class="nav-icon">🤝</span>TEAM</a>
        <a href="#" class="nav-item"><span class="nav-icon">💰</span>CASH</a>
        <a href="#" class="nav-item"><span class="nav-icon">👤</span>ME</a>
    </nav>

    <script>
        let balance = parseInt(localStorage.getItem('balance') || '0');
        let adsCount = parseInt(localStorage.getItem('adsToday') || '0');

        // UI Load
        document.getElementById('user-balance').innerText = balance.toLocaleString();
        document.getElementById('ads-count').innerText = adsCount;
        checkCheckinStatus();

        function updateBalance(amt) {
            balance += amt;
            localStorage.setItem('balance', balance);
            document.getElementById('user-balance').innerText = balance.toLocaleString();
        }

        function collectDaily() {
            const today = new Date().toDateString();
            if(localStorage.getItem('lastCheckin') === today) {
                alert("🚫 Aaj ka reward mil chuka hai!");
                return;
            }
            localStorage.setItem('lastCheckin', today);
            updateBalance(500);
            alert("🔋 +500 Coins added!");
            checkCheckinStatus();
        }

        function checkCheckinStatus() {
            const today = new Date().toDateString();
            if(localStorage.getItem('lastCheckin') === today) {
                const btn = document.getElementById('daily-btn');
                btn.innerText = "ALREADY CLAIMED";
                btn.disabled = true;
                btn.style.background = "#334155";
                document.getElementById('checkin-msg').innerText = "Come back tomorrow! 😊";
            }
        }

        function showAdsgram() {
            if(adsCount < 30) {
                adsCount++;
                localStorage.setItem('adsToday', adsCount);
                document.getElementById('ads-count').innerText = adsCount;
                updateBalance(200);
                alert("✅ 200 Coins Added!");
            } else {
                alert("🚫 Limit Reached!");
            }
        }

        function openOfferwall() {
            window.open("https://YOUR_LINK", "_blank");
        }

        function openMonetag() {
            window.open("https://YOUR_LINK", "_blank");
            setTimeout(() => { updateBalance(800); }, 5000);
        }
    </script>
</body>
</html>
