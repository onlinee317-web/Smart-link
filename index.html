<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnStream Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <style>
        :root {
            --primary-green: #10B981;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: sans-serif;
            margin: 0;
            padding-bottom: 70px;
        }

        .header {
            padding: 15px;
            background: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-green);
        }

        .balance-box {
            font-weight: bold;
            color: var(--primary-green);
            background: rgba(16, 185, 129, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
        }

        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
        }

        .btn-main {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .btn-main:disabled { background: #475569; }

        /* Navigation Bar */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #334155;
        }

        .nav-item {
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
        }

        .nav-item.active { color: var(--primary-green); }
        .nav-item span { display: block; font-size: 20px; }

        /* Stats Grid */
        .stats-row { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .stat-item { font-size: 13px; color: #94a3b8; }
        .stat-item b { color: var(--primary-green); display: block; font-size: 16px; }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="user-display">USER 👤</div>
        <div class="balance-box">💸 $<span id="balance">0.0000</span></div>
    </div>

    <div id="home" class="tab-content active">
        <div class="card">
            <h3>WATCH & EARN 📺</h3>
            <p style="font-size: 12px; color: #94a3b8; margin-bottom: 15px;">Watch ads to earn rewards</p>
            
            <div class="stats-row">
                <div class="stat-item">Phase<b id="session-name">1</b></div>
                <div class="stat-item">Progress<b id="progress">0/15</b></div>
            </div>

            <button id="ad-btn" class="btn-main" onclick="playVideoAd()">PLAY VIDEO 📺</button>
        </div>

        <div class="card" style="border: 1px solid #334155;">
            <h3>BOOST EARNINGS 🚀</h3>
            <p style="font-size: 12px; color: #94a3b8;">Trigger a quick task to boost balance</p>
            <button class="btn-main" style="background: transparent; border: 1px solid var(--primary-green); color: var(--primary-green);" onclick="triggerPopunder()">BOOST NOW 🚀</button>
        </div>
    </div>

    <div id="partners" class="tab-content">
        <div class="card">
            <h3>CASH PARTNERS 💸</h3>
            <p>Complete tasks from our global sponsors.</p>
            <button class="btn-main" onclick="triggerPopunder()">OPEN WALL 🚀</button>
        </div>
        
        <div class="card">
            <h3>INVITE FRIENDS 👥</h3>
            <input type="text" id="ref-link" readonly value="Loading link...">
            <button class="btn-main" style="margin-top:10px" onclick="copyRef()">COPY LINK 📋</button>
        </div>
    </div>

    <div id="withdraw" class="tab-content">
        <div class="card">
            <h3>WITHDRAW CASH 💸</h3>
            <h2 id="total-val">$0.0000</h2>
            <p style="font-size: 11px;">Min. Withdrawal: $100</p>
            <input type="text" id="wallet" placeholder="USDT Address (TRC20)">
            <button class="btn-main" style="margin-top:15px" onclick="handleWithdraw()">WITHDRAW 🚀</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('home', this)">
            <span>🏠</span>Home
        </div>
        <div class="nav-item" onclick="switchTab('partners', this)">
            <span>🚀</span>Partners
        </div>
        <div class="nav-item" onclick="switchTab('withdraw', this)">
            <span>💸</span>Withdraw
        </div>
    </div>

    <script>
        // CONFIG
        const SMART_LINK = "YOUR_LINK_HERE";
        const ADSGRAM_ID = "YOUR_ID_HERE";
        const BOT_USER = "YourBotName";

        // STATE
        let balance = parseFloat(localStorage.getItem('bal') || '0');
        let session = parseInt(localStorage.getItem('ses') || '1');
        let count = parseInt(localStorage.getItem('cnt') || '0');
        let cooldown = parseInt(localStorage.getItem('cd') || '0');
        let lastAd = parseInt(localStorage.getItem('la') || '0');

        const limits = [15, 15, 20];

        function updateUI() {
            const usd = (balance / 100).toFixed(4);
            document.getElementById('balance').innerText = usd;
            document.getElementById('total-val').innerText = "$" + usd;
            document.getElementById('session-name').innerText = session;
            document.getElementById('progress').innerText = count + "/" + (limits[session-1] || 15);
        }

        function save() {
            localStorage.setItem('bal', balance);
            localStorage.setItem('ses', session);
            localStorage.setItem('cnt', count);
            localStorage.setItem('cd', cooldown);
            localStorage.setItem('la', lastAd);
            updateUI();
        }

        // TABS (Clean - No Ads)
        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // ADSGRAM
        let AdController = null;
        if(window.Adsgram) { AdController = window.Adsgram.init({ blockId: ADSGRAM_ID }); }

        function playVideoAd() {
            let now = Date.now();
            if(cooldown > now) return alert("Cooldown active!");
            if(now - lastAd < 10000) return alert("Wait 10s!");

            if(AdController) {
                AdController.show().then(() => {
                    balance += 2; // $0.02
                    count++;
                    lastAd = Date.now();
                    if(count >= (limits[session-1] || 15)) {
                        count = 0;
                        session = session >= 3 ? 1 : session + 1;
                        cooldown = Date.now() + (4 * 60 * 60 * 1000);
                    }
                    save();
                }).catch(() => alert("Ad failed"));
            }
        }

        function triggerPopunder() {
            window.open(SMART_LINK, '_blank');
        }

        function copyRef() {
            const link = document.getElementById('ref-link');
            link.select();
            document.execCommand('copy');
            alert("Copied!");
        }

        function handleWithdraw() {
            if(balance < 10000) return alert("Minimum $100 required!");
            balance = 0;
            save();
            alert("Request Sent!");
        }

        // Timer Loop
        setInterval(() => {
            const btn = document.getElementById('ad-btn');
            let now = Date.now();
            if(cooldown > now) {
                btn.disabled = true;
                btn.innerText = "COOLDOWN ⏳";
            } else if(now - lastAd < 10000) {
                btn.disabled = true;
                btn.innerText = "WAIT " + Math.ceil((10000-(now-lastAd))/1000) + "s";
            } else {
                btn.disabled = false;
                btn.innerText = "PLAY VIDEO 📺";
            }
        }, 1000);

        // TG Init
        const tg = window.Telegram.WebApp;
        tg.expand();
        if(tg.initDataUnsafe?.user) {
            const u = tg.initDataUnsafe.user;
            document.getElementById('user-display').innerText = (u.username || u.first_name).toUpperCase() + " 👤";
            document.getElementById('ref-link').value = "https://t.me/" + BOT_USER + "?start=" + u.id;
        }

        updateUI();
    </script>
</body>
</html>
