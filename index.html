<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn Stream Pro 💎</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{background:#020617;color:white}
.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px)}

@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.pulse{animation:pulse 1s infinite}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-80px);opacity:0}
}
.float{position:absolute;animation:float 0.8s}
</style>

</head>

<body class="select-none">

<!-- HEADER -->

<div class="p-6 bg-gradient-to-br from-yellow-400 via-orange-500 to-red-600 rounded-b-[40px] shadow-xl">
<div class="flex justify-between items-center">
<div>
<p class="text-xs uppercase font-bold opacity-80">Your Balance</p>
<h1 class="text-4xl font-black">💰 <span id="balance">0</span></h1>
<p class="text-sm">$<span id="dollar">0.00</span></p>
</div>
<div class="text-5xl">🚀</div>
</div>
</div>

<div class="p-5 space-y-6">

<!-- DAILY -->

<button id="dailyBtn" class="w-full py-4 bg-white text-black font-black rounded-2xl">
CLAIM DAILY 🎁
</button>

<!-- MAIN -->

<div class="glass p-6 rounded-3xl text-center">
<button id="mainBtn" class="text-7xl pulse">💸</button>

<div class="mt-4 flex justify-around text-sm">
<div>Links: <span id="links">0</span>/10</div>
<div>Ads: <span id="ads">0</span>/20</div>
</div>

<!-- PROGRESS -->

<div class="mt-4 bg-white/10 h-3 rounded-full overflow-hidden">
<div id="progress" class="h-full bg-gradient-to-r from-yellow-400 to-orange-500" style="width:0%"></div>
</div>

<p class="text-[10px] mt-1 text-slate-400">Progress to bonus 🚀</p>
</div>

<!-- AD -->

<button id="adBtn" class="w-full py-4 bg-blue-600 rounded-2xl font-black">
WATCH AD 🎥
</button>

<!-- BONUS -->

<button id="bonusBtn" class="w-full py-4 bg-yellow-500 text-black rounded-2xl font-black">
BONUS 🔥 (Unlock after 10 ads)
</button>

</div>

<script>
// 🎯 SETTINGS
const RATE=1000;
const ADS_LIMIT=20;
const LINKS_LIMIT=10;

// ⏱️ COOLDOWN
let lastAd=0;
let lastLink=0;

// 📊 USER DATA (LOCAL DEMO)
let data={
balance:0,
ads:0,
links:0,
daily:false
};

// 🔄 UI UPDATE
function updateUI(){
balance.innerText=data.balance;
dollar.innerText=(data.balance/RATE).toFixed(2);
ads.innerText=data.ads;
links.innerText=data.links;

let p=(data.ads/ADS_LIMIT)*100;
progress.style.width=p+"%";
}

// ✨ EMOJI EFFECT
function emoji(x,y){
let e=document.createElement("div");
e.className="float";
e.style.left=x+"px";
e.style.top=y+"px";
e.innerText=["💸","🔥","✨","🚀"][Math.floor(Math.random()*4)];
document.body.appendChild(e);
setTimeout(()=>e.remove(),800);
}

// 🎥 AD
adBtn.onclick=(e)=>{
let now=Date.now();

if(now-lastAd<5000){
alert("Wait ⏳");
return;
}
if(data.ads>=ADS_LIMIT){
alert("Limit reached 🚫");
return;
}

window.open("YOUR_AD_LINK");

setTimeout(()=>{
data.balance+=30;
data.ads++;
lastAd=Date.now();
updateUI();
},4000);

emoji(e.clientX,e.clientY);
};

// 🔗 LINK
mainBtn.onclick=(e)=>{
let now=Date.now();

if(now-lastLink<4000){
alert("Slow down ⚠️");
return;
}
if(data.links>=LINKS_LIMIT){
alert("Limit reached");
return;
}

window.open("YOUR_SMARTLINK");

setTimeout(()=>{
data.balance+=80;
data.links++;
lastLink=Date.now();
updateUI();
},3000);

emoji(e.clientX,e.clientY);
};

// 🎁 DAILY
dailyBtn.onclick=()=>{
if(data.daily){
alert("Already claimed");
return;
}

data.balance+=300;
data.daily=true;
updateUI();

dailyBtn.innerText="CLAIMED ✅";
dailyBtn.style.opacity="0.5";
};

// 🔥 BONUS
bonusBtn.onclick=(e)=>{
if(data.ads<10){
alert("Complete 10 ads first");
return;
}

data.balance+=50;
updateUI();
emoji(e.clientX,e.clientY);
};

// INIT
updateUI();
</script>

</body>
</html>
