    <style>
        /* 🎨 EXACT COLOR SCHEME FROM IMAGE */
        body { 
            background-color: #0f172a !important; /* Very Dark Navy */
            color: #ffffff !important; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            margin: 0; padding: 0;
        }

        /* Top Gradient Card */
        .header-card {
            background: linear-gradient(135deg, #fb923c 0%, #ef4444 100%) !important;
            border-radius: 24px;
            padding: 24px;
            position: relative;
            overflow: hidden; /* 🛡️ Fixes flying cash inside card */
        }

        /* Dark Cards (Daily Check-in, etc.) */
        .feature-card {
            background-color: #1e293b !important;
            border-radius: 20px;
            padding: 20px;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* 💸 WINGS ANIMATION FIX (Card ke andar) */
        .cash-box {
            position: absolute;
            right: 15px;
            top: 20px;
            font-size: 55px;
            z-index: 10;
        }
        .wings-flap {
            display: inline-block;
            animation: flap Wings 0.8s ease-in-out infinite alternate;
        }
        @keyframes flapWings {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-12px) scale(1.1); }
        }

        /* White Claim Button from Image */
        .claim-btn {
            background-color: #ffffff !important;
            color: #000000 !important;
            font-weight: 900;
            font-size: 1.1rem;
            padding: 14px;
            border-radius: 16px;
            width: 100%;
            text-align: center;
            margin-top: 12px;
        }

        .blue-btn {
            background: linear-gradient(to right, #3b82f6, #6366f1) !important;
            color: white !important;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
        }

        .text-white-all * { color: white !important; }
        .font-xl { font-size: 3rem; font-weight: 800; }
    </style>
</head>
<body class="select-none">

    <main class="p-4 pb-28 space-y-6">

        <!-- 1. HEADER BALANCE CARD (ORANGE/RED) -->
        <div class="header-card animate__animated animate__fadeInDown">
            <p class="text-sm font-bold opacity-80 uppercase tracking-tighter">Balance</p>
            <div class="flex items-center gap-1">
                <span class="text-3xl text-yellow-300 font-bold">$</span>
                <h2 class="font-xl" id="balance">0</h2>
            </div>
            
            <!-- 💸 Animated Cash (Bound inside card) -->
            <div class="cash-box">
                <span class="wings-flap">💸</span>
            </div>
        </div>

        <!-- 2. DAILY CHECK-IN -->
        <div class="feature-card">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">📅</span>
                    <h3 class="text-lg font-bold">Daily Check-in</h3>
                </div>
                <span class="text-green-400 text-sm font-bold px-3 py-1 bg-green-900/30 rounded-full">Ready</span>
            </div>
            <button onclick="claimDaily()" id="checkinBtn" class="claim-btn active:scale-95 transition-all">
                Collect 500 Coins 🎁
            </button>
        </div>

        <!-- 3. WATCH & EARN -->
        <div class="feature-card">
            <div class="flex items-center gap-3 mb-4">
                <span class="text-2xl">📺</span>
                <h3 class="text-lg font-bold">Watch & Earn <span class="text-gray-400 text-sm">(20/Day)</span></h3>
            </div>
            
            <div class="flex justify-between items-center">
                <div>
                    <h4 class="text-blue-400 font-bold">Rewarded Ad</h4>
                    <p class="text-xs text-gray-400"><span id="adsDone">0</span>/20 Completed</p>
                </div>
                <button onclick="watchAd()" class="blue-btn active:scale-95 shadow-lg">
                    Watch Now
                </button>
            </div>
        </div>

        <!-- 4. EXTRA REWARDS (GRID) -->
        <div class="grid grid-cols-2 gap-4">
            <div class="feature-card m-0 flex flex-col items-center justify-center text-center p-6 border-b-4 border-blue-500">
                <span class="text-4xl mb-2">🛡️</span>
                <h4 class="font-bold text-sm">Earn 300% More 🚀💸</h4>
            </div>
            <div class="feature-card m-0 flex flex-col items-center justify-center text-center p-6 border-b-4 border-yellow-500">
                <span class="text-4xl mb-2">⚡</span>
                <h4 class="font-bold text-sm">Limited Offer ⌛💸</h4>
            </div>
        </div>

    </main>

    <!-- 5. BOTTOM NAVIGATION BAR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f172a] border-t border-gray-800 p-4 flex justify-around items-center">
        <div class="text-center text-blue-500 font-bold">
            <div class="text-2xl">🏠</div>
            <p class="text-[10px] uppercase">Home</p>
        </div>
        <div class="text-center opacity-40">
            <div class="text-2xl">👥</div>
            <p class="text-[10px] uppercase">Referral</p>
        </div>
        <div class="text-center opacity-40">
            <div class="text-2xl">💳</div>
            <p class="text-[10px] uppercase">Withdraw</p>
        </div>
    </nav>
