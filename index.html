<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Elite Dashboard Pro</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

* {
    margin: 0; padding: 0; box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background-color: #0F172A;
    color: #ffffff;
    min-height: 100vh;
    overflow-x: hidden;
    overflow-y: scroll;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    padding: 30px 20px;
    border-bottom-left-radius: 40px;
    border-bottom-right-radius: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.balance-label {
    font-size: 11px;
    letter-spacing: 2px;
    font-weight: 800;
}

.balance-amount {
    font-size: 32px;
    font-weight: 800;
}

/* 💸 MONEY ANIMATION */
.money-wrapper {
    position: relative;
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.money-emoji {
    font-size: 50px;
    z-index: 2;
    animation: floatMoney 2s infinite ease-in-out;
}

.wing {
    position: absolute;
    font-size: 22px;
    animation: wingFlap 0.5s infinite ease-in-out;
}

.left-wing { left: -12px; top: 22px; }
.right-wing { right: -12px; top: 22px; }

@keyframes floatMoney {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}

@keyframes wingFlap {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(25deg) scale(1.3); }
    100% { transform: rotate(0deg) scale(1); }
}

/* CONTENT */
.content-area {
    padding: 20px;
    padding-bottom: 150px;
}

.card {
    background: #1E293B;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    font-weight: 800;
    cursor: pointer;
}

.btn-blue { background: #3B82F6; color: white; }
.btn-green { background: #10B981; color: white; }
.btn-pink { background: #EC4899; color: white; }

/* NAV */
nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #0B1120;
    display: flex;
    justify-content: space-around;
    padding: 15px;
}

.nav-item {
    color: #64748B;
    font-size: 14px;
    text-align: center;
}

.nav-item.active {
    color: #818CF8;
}

.nav-icon {
    font-size: 26px;
    display: block;
}

/* TABS */
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>
</head>

<body>

<header>
    <div>
        <div class="balance-label">MY RICHES 💸</div>
        <div class="balance-amount"><span id="balance">0</span></div>
    </div>

    <!-- 💸 ANIMATED MONEY -->
    <div class="money-wrapper">
        <span class="money-emoji">💸</span>
        <span class="wing left-wing">🪽</span>
        <span class="wing right-wing">🪽</span>
    </div>
</header>

<div class="content-area">

<div id="earn" class="tab-content active">
    <div class="card">
        <h3>Daily Check-in 🎁</h3>
        <button class="btn btn-green" onclick="earn(500)">CLAIM 500</button>
    </div>

    <div class="card">
        <button class="btn btn-blue" onclick="earn(100)">WATCH ADS ▶️</button>
    </div>

    <div class="card">
        <button class="btn btn-pink" onclick="earn(200)">SMART LINK 🔗</button>
    </div>
</div>

<div id="team" class="tab-content">
    <div class="card">
        <input value="https://t.me/yourbot" readonly>
    </div>
</div>

<div id="cash" class="tab-content">
    <div class="card">
        <h2>$0.00</h2>
    </div>
</div>

</div>

<nav>
    <div class="nav-item active" onclick="tab('earn', this)">
        <span class="nav-icon">🏠</span>EARN
    </div>
    <div class="nav-item" onclick="tab('team', this)">
        <span class="nav-icon">👥</span>TEAM
    </div>
    <div class="nav-item" onclick="tab('cash', this)">
        <span class="nav-icon">💰</span>CASH
    </div>
</nav>

<script>
let balance = 0;

function earn(amount){
    balance += amount;
    document.getElementById("balance").innerText = balance;
}

function tab(id, el){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
    el.classList.add("active");
}
</script>

</body>
</html>
