<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Earn Stream Pro 💎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        // ⚙️ 1. FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 🔗 2. EARNING LIMITS
        const RATE = 1000; // 1000 Coins = $1
        const ADS_PER_SESSION = 7;
        const TOTAL_ADS_LIMIT = 28; // 4 Sessions of 7 ads

        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user || { id: "Guest_User", first_name: "Legend" };
        const userId = user.id;

        window.addEventListener('load', () => {
            tg.expand();
            syncWithFirebase();
        });

        async function syncWithFirebase(reward = 0, type = '') {
            const userRef = ref(db, 'users/' + userId);
            const snapshot = await get(userRef);
            let data = snapshot.exists() ? snapshot.val() : { 
                balance: 0, adsWatched: 0, lastCheckin: "", name: user.first_name 
            };

            const today = new Date().toLocaleDateString();
            
            // Daily Reset Logic
            if(data.lastReset !== today) {
                data.adsWatched = 0;
                data.lastReset = today;
            }

            if(reward > 0) {
                if(type === 'ad' && data.adsWatched < TOTAL_ADS_LIMIT) {
                    data.balance += reward;
                    data.adsWatched++;
                } else if(type === 'daily' && data.lastCheckin !== today) {
                    data.balance += reward;
                    data.lastCheckin = today;
                }
                await set(userRef, data);
            }

            // UI UPDATES
            document.getElementById('balance').innerText = `$${(data.balance / RATE).toFixed(2)}`;
            document.getElementById('coin_balance').innerText = data.balance.toLocaleString();
            document.getElementById('wBalance').innerText = data.balance.toLocaleString();
            document.getElementById('adsDone').innerText = data.adsWatched;
            
            // Session Info
            let currentSession = Math.floor(data.adsWatched / ADS_PER_SESSION) + 1;
            document.getElementById('session_info').innerText = `${currentSession > 4 ? 4 : currentSession}/4`;

            // Progress Bar
            let progress = (data.adsWatched / TOTAL_ADS_LIMIT) * 100;
            document.getElementById('progress_bar').style.width = `${progress}%`;

            if(data.lastCheckin === today) {
                document.getElementById('checkinBtn').disabled = true;
                document.getElementById('checkinBtn').innerText = "CLAIMED ✅";
                document.getElementById('checkinBtn').classList.add('opacity-50');
            }
        }

        // Ads Logic with Cooldown
        let isCooldown = false;
        window.watchAd = async () => {
            if(isCooldown) { alert("Wait 60s cooldown! ⏳"); return; }
            
            // 🛑 TRIGGER ADSGRAM HERE
            console.log("Showing AdsGram Video...");
            
            // On Success:
            await syncWithFirebase(3, 'ad'); // $0.003 per ad
            isCooldown = true;
            document.getElementById('ad_status').innerText = "Cooldown... ⏳";
            setTimeout(() => { 
                isCooldown = false; 
                document.getElementById('ad_status').innerText = "Watch & Earn";
            }, 60000);
        };

        window.claimDaily = () => syncWithFirebase(50, 'daily');

        window.switchTab = (tab) => {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(tab + 'Page').classList.remove('hidden');
            
            // Update Nav Styles
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('text-[#34A853]', 'font-bold'));
            document.getElementById('btn-' + tab).classList.add('text-[#34A853]', 'font-bold');
        };

        window.copyRef = () => {
            navigator.clipboard.writeText(`https://t.me/your_bot?start=${userId}`);
            alert("Link Copied! 🔗");
        };

    </script>

    <style>
        body { font-family: -apple-system, sans-serif; background-color: #F8F9FA; color: #1a1a1a; }
        .ios-card { background: white; border-radius: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .premium-green { background-color: #34A853; }
        .emoji-anim { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="select-none">

    <header class="flex justify-between items-center p-6 bg-white border-b">
        <div class="text-gray-400">☰</div>
        <h1 class="text-lg font-bold">Google Rewards</h1>
        <div class="w-10 h-10 bg-gray-200 rounded-full overflow-hidden border-2 border-[#34A853]">
            <img id="user_pic" src="https://via.placeholder.com/40">
        </div>
    </header>

    <main class="p-5 pb-24 space-y-6">

        <div id="homePage" class="page animate__animated animate__fadeIn">
            <div class="ios-card p-6 relative overflow-hidden mb-6 border-b-4 border-[#34A853]">
                <p class="text-sm text-gray-500 font-medium">Google Play Balance</p>
                <h2 class="text-4xl font-black mt-1" id="balance">$0.00</h2>
                <p class="text-xs text-[#34A853] font-bold mt-1">🪙 <span id="coin_balance">0</span> Coins</p>
                
                <div class="mt-6 flex justify-between items-end">
                    <button onclick="switchTab('withdraw')" class="premium-green text-white px-6 py-2.5 rounded-full text-sm font-bold active:scale-95 transition-all">
                        Reward Send 📤
                    </button>
                    <div class="emoji-anim text-6xl">🏆</div>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-sm font-black text-gray-400 uppercase tracking-widest ml-2">Daily Missions</h3>
                
                <button id="checkinBtn" onclick="claimDaily()" class="w-full ios-card p-5 flex items-center justify-between active:scale-95 transition-all">
                    <div class="flex items-center gap-4">
                        <span class="text-3xl">📅</span>
                        <div class="text-left">
                            <h4 class="font-bold">Daily Check-in</h4>
                            <p class="text-xs text-gray-500">Collect your daily 50 coins</p>
                        </div>
                    </div>
                    <span class="text-[#34A853] font-bold">+50</span>
                </button>

                <div class="ios-card p-5 space-y-4">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <span class="text-3xl">📱</span>
                            <div>
                                <h4 class="font-bold">Video Session <span id="session_info">1/4</span></h4>
                                <p class="text-xs text-gray-500" id="ad_status">Watch & Earn</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-bold text-[#34A853]"><span id="adsDone">0</span>/28</p>
                        </div>
                    </div>
                    
                    <div class="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden">
                        <div id="progress_bar" class="premium-green h-full transition-all" style="width: 0%"></div>
                    </div>

                    <button onclick="watchAd()" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold text-sm active:scale-95 transition-all">
                        WATCH VIDEO AD 🎥
                    </button>
                </div>
            </div>
        </div>

        <div id="referralPage" class="page hidden animate__animated animate__fadeIn space-y-6">
            <div class="ios-card p-8 text-center">
                <div class="text-7xl mb-4">🎁</div>
                <h2 class="text-2xl font-black">Invite Friends</h2>
                <p class="text-gray-500 text-sm mt-2">Get 100 coins for every active referral</p>
                <div class="mt-6 p-4 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Your Personal Link</p>
                    <p id="refLink" class="text-xs font-mono text-gray-600">t.me/your_bot?start=user</p>
                </div>
                <button onclick="copyRef()" class="w-full mt-4 py-4 premium-green text-white font-bold rounded-2xl">Copy Link 🔗</button>
            </div>
        </div>

        <div id="withdrawPage" class="page hidden animate__animated animate__fadeIn space-y-6">
            <div class="ios-card p-8 text-center border-b-4 border-orange-500">
                <p class="text-gray-500 text-xs font-bold uppercase">Redeemable Balance</p>
                <h2 class="text-4xl font-black text-gray-900 mt-2">🪙 <span id="wBalance">0</span></h2>
            </div>
            
            <div class="ios-card p-6 space-y-4">
                <select class="w-full p-4 bg-gray-50 rounded-xl border outline-none font-bold text-sm">
                    <option>EasyPaisa / JazzCash</option>
                    <option>USDT (TRC20)</option>
                </select>
                <input type="text" placeholder="Account Number / Wallet" class="w-full p-4 bg-gray-50 rounded-xl border outline-none text-sm">
                <button class="w-full py-5 bg-black text-white rounded-2xl font-black active:scale-95 transition-all">REQUEST WITHDRAW</button>
                <p class="text-center text-[10px] text-red-500 font-bold">MINIMUM WITHDRAW: $100 (100,000 COINS)</p>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t flex justify-around p-4 pb-6 z-50">
        <button onclick="switchTab('home')" id="btn-home" class="nav-item flex flex-col items-center text-[#34A853] font-bold">
            <span class="text-2xl">🏠</span>
            <span class="text-[10px] uppercase mt-1">Home</span>
        </button>
        <button onclick="switchTab('referral')" id="btn-referral" class="nav-item flex flex-col items-center text-gray-400">
            <span class="text-2xl">👥</span>
            <span class="text-[10px] uppercase mt-1">Invites</span>
        </button>
        <button onclick="switchTab('withdraw')" id="btn-withdraw" class="nav-item flex flex-col items-center text-gray-400">
            <span class="text-2xl">💳</span>
            <span class="text-[10px] uppercase mt-1">Payout</span>
        </button>
    </nav>

</body>
          </html>
