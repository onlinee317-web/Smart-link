<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Earn Stream Pro 💎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css""")/>>
    
    <style>
        /* Apple System Fonts & Colors */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #00152b; /* Deep Dark Blue */
            color: #ffffff; 
        }
        
        .bg-dark-blue { background-color: #001f3f; }
        .bg-orange-main { background-color: #FF8C00; }
        .text-yellow-bright { color: #FFD700; }
        
        .ios-card { 
            background: #FF8C00; /* Main card is Orange */
            border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: white;
        }

        /* Flying Wings Animation */
        .cash-container { position: relative; display: inline-block; font-size: 70px; }
        .wings {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            animation: flyWings 0.8s ease-in-out infinite alternate;
        }
        @keyframes flyWings {
            from { transform: scale(1) translateY(0); }
            to { transform: scale(1.2) translateY(-10px); }
        }

        .nav-item { color: #ffffff; font-size: 18px; }
        .btn-action {
            background-color: #FF8C00;
            padding: 15px 25px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>

    <script type="module">
        // Firebase configuration yahan wapis paste karein jo pehle thi
        // ... (Firebase logic same rahegi)
    </script>
</head>
<body class="select-none text-white">

    <!-- Header Section -->
    <header class="flex justify-between items-center p-6 bg-dark-blue border-b border-gray-700">
        <div class="text-2xl">☰</div>
        <h1 class="text-2xl font-bold tracking-tight">Earn Stream Pro 💎</h1>
        <div class="w-12 h-12 bg-yellow-400 rounded-full overflow-hidden border-2 border-white">
            <img id="user_pic" src="https://placeholder.com">
        </div>
    </header>

    <main class="p-5 pb-24 space-y-8">

        <!-- Main Balance Card (Orange) -->
        <div id="homePage" class="page animate__animated animate__fadeIn">
            <div class="ios-card p-8 relative overflow-hidden mb-8 border-2 border-yellow-400">
                <p class="text-lg font-medium opacity-90">Google Play Balance</p>
                <h2 class="text-5xl font-black mt-2" id="balance">$0.00</h2>
                <p class="text-xl font-bold mt-2 text-yellow-200">🪙 <span id="coin_balance">0</span> Coins</p>
                
                <div class="mt-8 flex justify-between items-center">
                    <button onclick="switchTab('withdraw')" class="bg-white text-orange-600 px-8 py-3 rounded-2xl text-lg font-black active:scale-95 transition-all shadow-lg">
                        Withdraw 📤
                    </button>
                    
                    <!-- Cash with Flying Wings -->
                    <div class="cash-container">
                        <span class="wings">💸</span>
                    </div>
                </div>
            </div>

            <!-- Missions Section -->
            <div class="space-y-6">
                <h3 class="text-xl font-black text-yellow-400 uppercase tracking-widest ml-2">Daily Missions</h3>
                
                <!-- Daily Check-in -->
                <button id="checkinBtn" onclick="claimDaily()" class="w-full bg-dark-blue p-6 rounded-3xl flex items-center justify-between border-2 border-orange-500 active:scale-95 transition-all">
                    <div class="flex items-center gap-5">
                        <span class="text-4xl">📅</span>
                        <div class="text-left">
                            <h4 class="text-xl font-bold">Daily Check-in</h4>
                            <p class="text-sm text-gray-300">Free 50 coins everyday</p>
                        </div>
                    </div>
                    <span class="text-2xl font-black text-green-400">+50</span>
                </button>

                <!-- Video Ads Card -->
                <div class="bg-dark-blue p-6 rounded-3xl space-y-5 border-2 border-red-500">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-5">
                            <span class="text-4xl">🎬</span>
                            <div>
                                <h4 class="text-xl font-bold">Video Session <span id="session_info" class="text-yellow-400">1/4</span></h4>
                                <p class="text-sm text-gray-300">Watch ads to earn dollars</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Progress Bar -->
                    <div class="w-full bg-gray-800 h-4 rounded-full overflow-hidden">
                        <div id="progress_bar" class="bg-gradient-to-r from-yellow-400 to-orange-500 h-full transition-all" style="width: 0%"></div>
                    </div>

                    <button onclick="watchAd()" class="w-full bg-orange-main py-4 rounded-2xl text-xl font-black shadow-xl active:scale-95">
                        <span id="ad_status">Watch & Earn 🚀</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-dark-blue border-t border-gray-800 p-4 flex justify-around items-center">
        <button onclick="switchTab('home')" id="btn-home" class="nav-item flex flex-col items-center">
            <span class="text-2xl">🏠</span>
            <span class="text-xs">Home</span>
        </button>
        <button onclick="switchTab('refer')" id="btn-refer" class="nav-item flex flex-col items-center">
            <span class="text-2xl">👥</span>
            <span class="text-xs">Invite</span>
        </button>
        <button onclick="switchTab('withdraw')" id="btn-withdraw" class="nav-item flex flex-col items-center">
            <span class="text-2xl">💰</span>
            <span class="text-xs">Wallet</span>
        </button>
    </nav>

</body>
</html>
